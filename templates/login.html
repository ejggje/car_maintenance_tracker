<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Car Maintenance Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f6f9; color: #333;
               display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card {
            background: white; border-radius: 12px; padding: 40px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.10); width: 100%; max-width: 400px;
        }
        .brand { font-size: 22px; font-weight: bold; color: #e94560; margin-bottom: 8px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 28px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: bold; }
        .form-group input {
            width: 100%; padding: 10px 12px; border: 1px solid #ddd;
            border-radius: 6px; font-size: 14px;
        }
        .form-group input:focus { outline: none; border-color: #e94560; }
        .btn-login {
            width: 100%; padding: 11px; background: #e94560; color: white;
            border: none; border-radius: 6px; font-size: 15px; cursor: pointer; margin-top: 8px;
        }
        .btn-login:hover { background: #c73652; }
        .flash { background: #fdecea; color: #a32d2d; padding: 10px 14px;
                 border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
        .change-pw-link { display: block; text-align: center; margin-top: 16px;
                          font-size: 13px; color: #666; text-decoration: none; }
        .change-pw-link:hover { color: #e94560; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">🚗 Car Maintenance Tracker</div>
        <div class="subtitle">Sign in to your account</div>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}
        <form method="POST" action="/login">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@email.com" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>
        <a href="/change-password" class="change-pw-link">Change password</a>
    </div>
</body>
</html>
